# Conda environment for the gimpsegany SAM2 backend on macOS Apple Silicon.
#
# Create with:
#   conda env create -f environment-macos.yml
#   conda activate sam2
#
# Then install SAM2 itself (not on conda-forge / PyPI) pinned to the
# known-good commit, so the build is reproducible:
#   SAM2_BUILD_CUDA=0 pip install \
#     "git+https://github.com/facebookresearch/sam2.git@2b90b9f5ceec907a1c18123530e92e794ad901a4"
#
# Python deps are pinned in requirements-lock.txt (shared with the installers).
#
name: sam2
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - -r requirements-lock.txt
      # Optional — only needed if you also want SAM1 models (pinned commit):
      # - git+https://github.com/facebookresearch/segment-anything.git@dca509fe793f601edb92606367a655c15ac00fdf
